name: Vercel Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # PRм—җ лҢ“кёҖ лӢ¬кё° мң„н•ҙ н•„мҡ”

    steps:
      # в”Җв”Җ 1. мҪ”л“ң мІҙнҒ¬м•„мӣғ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Checkout
        uses: actions/checkout@v4

      # в”Җв”Җ 2. Node / pnpm м„Өм • в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # в”Җв”Җ 3. лёҢлһңм№ҳ мқҙлҰ„ вҶ’ Turso DB мқҙлҰ„мңјлЎң ліҖнҷҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      #    Turso DB мқҙлҰ„ к·ңм№ҷ: мҶҢл¬ёмһҗ, мҲ«мһҗ, н•ҳмқҙн”Ҳл§Ң н—Ҳмҡ© / мөңлҢҖ 32мһҗ
      - name: Sanitize branch name for Turso DB
        id: db_name
        run: |
          RAW="${{ github.event.pull_request.head.ref }}"
          # мҶҢл¬ёмһҗ ліҖнҷҳ, мҠ¬лһҳмӢң/м–ёлҚ”мҠӨмҪ”м–ҙ/м җ вҶ’ н•ҳмқҙн”Ҳ, нҠ№мҲҳл¬ёмһҗ м ңкұ°, мөңлҢҖ 32мһҗ
          SANITIZED=$(echo "$RAW" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's|[/_.]|-|g' \
            | sed 's|[^a-z0-9-]||g' \
            | sed 's|--*|-|g' \
            | sed 's|^-||;s|-$||' \
            | cut -c1-32)
          # PR лІҲнҳёлҘј prefixлЎң л¶ҷм—¬ м¶©лҸҢ л°©м§Җ
          DB_NAME="pr-${{ github.event.pull_request.number }}-${SANITIZED}"
          DB_NAME=$(echo "$DB_NAME" | cut -c1-32)
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT
          echo "Turso DB name: $DB_NAME"

      # в”Җв”Җ 4. Turso Preview DB мғқм„ұ (кё°мЎҙ DB ліөм ң) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Create Turso Preview DB
        id: turso_db
        run: |
          # мқҙлҜё мЎҙмһ¬н•ҳлҠ” DBмқём§Җ нҷ•мқё (мһ¬мӢңлҸ„ мӢң мӨ‘ліө мғқм„ұ л°©м§Җ)
          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORGANIZATION_NAME }}/databases/${{ steps.db_name.outputs.db_name }}" \
            | jq -r '.database.Hostname // empty')

          if [ -n "$EXISTING" ]; then
            echo "DB already exists: $EXISTING"
            echo "db_url=libsql://$EXISTING" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${{ steps.db_name.outputs.db_name }}\",
                \"group\": \"${{ secrets.TURSO_GROUP_NAME }}\",
                \"seed\": {
                  \"type\": \"database\",
                  \"name\": \"${{ secrets.TURSO_DATABASE_NAME }}\"
                }
              }" \
              "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORGANIZATION_NAME }}/databases")

            echo "Turso API response: $RESPONSE"

            HOSTNAME=$(echo "$RESPONSE" | jq -r '.database.Hostname // empty')
            if [ -z "$HOSTNAME" ]; then
              echo "вқҢ Failed to create Turso DB"
              echo "$RESPONSE"
              exit 1
            fi

            echo "вң… Created Turso DB: $HOSTNAME"
            echo "db_url=libsql://$HOSTNAME" >> $GITHUB_OUTPUT
          fi

      # в”Җв”Җ 5. Turso Preview DB Auth Token мғқм„ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Create Turso DB Token
        id: turso_token
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORGANIZATION_NAME }}/databases/${{ steps.db_name.outputs.db_name }}/auth/tokens?expiration=7d")

          TOKEN=$(echo "$RESPONSE" | jq -r '.jwt // empty')
          if [ -z "$TOKEN" ]; then
            echo "вқҢ Failed to create DB token"
            echo "$RESPONSE"
            exit 1
          fi

          echo "db_token=$TOKEN" >> $GITHUB_OUTPUT
          echo "вң… DB token created"

      # в”Җв”Җ 6. Drizzle л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢӨн–ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations on Preview DB
        env:
          DATABASE_URL: ${{ steps.turso_db.outputs.db_url }}
          DATABASE_AUTH_TOKEN: ${{ steps.turso_token.outputs.db_token }}
        run: npx tsx scripts/migrate.ts

      # в”Җв”Җ 7. Vercel CLIлЎң Preview л°°нҸ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Preview)
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env DATABASE_URL="${{ steps.turso_db.outputs.db_url }}" \
            --env DATABASE_AUTH_TOKEN="${{ steps.turso_token.outputs.db_token }}" \
            --env BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}" \
            2>&1 | tail -1)

          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "вң… Deployed: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # в”Җв”Җ 8. PRм—җ Preview URL лҢ“кёҖ лӢ¬кё° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.vercel_deploy.outputs.preview_url }}';
            const dbName = '${{ steps.db_name.outputs.db_name }}';
            const body = [
              '## рҹҡҖ Vercel Preview л°°нҸ¬ мҷ„лЈҢ',
              '',
              `**Preview URL:** ${previewUrl}`,
              '',
              '| н•ӯлӘ© | к°’ |',
              '|------|-----|',
              `| лёҢлһңм№ҳ | \`${{ github.event.pull_request.head.ref }}\` |`,
              `| м»Өл°Ӣ | \`${{ github.event.pull_request.head.sha }}\` |`,
              `| DB (Turso) | \`${dbName}\` |`,
              '',
              '> PRмқҙ лӢ«нһҲл©ҙ Preview DBк°Җ мһҗлҸҷмңјлЎң мӮӯм ңлҗ©лӢҲлӢӨ.',
            ].join('\n');

            // кё°мЎҙ лҙҮ лҢ“кёҖ м°ҫм•„м„ң м—…лҚ°мқҙнҠё (мӨ‘ліө л°©м§Җ)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Vercel Preview л°°нҸ¬ мҷ„лЈҢ')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
